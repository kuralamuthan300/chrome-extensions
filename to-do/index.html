<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Use standard system fonts mirroring Google's Roboto/Product Sans -->
</head>
<body class="light-mode">
  <div id="app-container">
    
    <!-- Sidebar / Views Menu -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z" fill="currentColor"/>
          </svg>
          <h2>Tasks</h2>
        </div>
        <button id="theme-toggle" class="icon-btn" title="Toggle Dark Mode">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C11.6669 3 11.3384 3.01815 11.0156 3.05353C14.07 4.14811 16.25 7.10091 16.25 10.5C16.25 14.6421 12.8921 18 8.75 18C7.15178 18 5.67027 17.4988 4.45785 16.6577C5.93291 19.3134 8.76101 21 12 21Z" fill="currentColor"/></svg>
        </button>
      </div>
      
      <div class="views-list" id="views-list">
        <!-- Lists injected here by JS -->
      </div>
      
      <div class="add-view-container">
        <input type="text" id="new-view-input" placeholder="New list...">
        <button id="add-view-btn" class="icon-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content">
      <header class="main-header">
        <h1 id="current-view-title">My Tasks</h1>
        <div class="header-actions">
          <div class="search-container">
            <input type="text" id="search-input" placeholder="Search tasks...">
          </div>
          <button id="quick-add-tab-btn" class="action-btn" title="Save Current Tab">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
            Tab
          </button>
        </div>
      </header>

      <div class="task-input-container">
        <input type="text" id="new-task-input" placeholder="Add a task...">
        <button id="add-task-btn" class="fab-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
      </div>

      <!-- Task Details Editor Overlay (Hidden by default) -->
      <div id="task-editor-overlay" class="overlay hidden">
        <div class="editor-modal">
          <div class="editor-header">
            <input type="text" id="editor-title" placeholder="Task Name">
            <button id="close-editor-btn" class="icon-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
          </div>
          <div class="editor-body">
            <div class="form-group">
              <label>Deadline</label>
              <input type="datetime-local" id="editor-deadline">
            </div>
            <div class="form-group">
              <label>Linked URL</label>
              <input type="url" id="editor-url" placeholder="https://...">
            </div>
            <div class="form-group">
              <label>Subtasks</label>
              <div id="subtasks-container">
                <!-- Subtasks injected here -->
              </div>
              <div class="add-subtask-row">
                <input type="text" id="new-subtask-input" placeholder="Add subtask...">
                <button id="add-subtask-btn" class="text-btn">Add</button>
              </div>
            </div>
          </div>
          <div class="editor-footer">
            <button id="save-task-btn" class="primary-btn">Done</button>
          </div>
        </div>
      </div>

      <div class="tasks-container" id="tasks-list">
        <!-- Tasks injected here by JS -->
      </div>
    </main>

  </div>
  
  <script src="popup.js"></script>
</body>
</html>
